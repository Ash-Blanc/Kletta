<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <title>Kletta - Kaggle Agent Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#1a1a1a', // Claude-like dark bg
              surface: '#2a2a2a',    // Panel bg
              surfaceHighlight: '#3a3a3a',
              text: '#e0e0e0',
              textMuted: '#a0a0a0',
              accent: '#20beff',     // Kaggle Blue accent
              accentHover: '#008bb9',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
            },
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #1a1a1a;
        color: #e0e0e0;
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1a1a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3a3a3a; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4a4a4a; 
      }
    </style>
